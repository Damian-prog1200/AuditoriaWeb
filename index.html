<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Contable | Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/iniciosesion.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Auditorías en línea</h1>
      <p class="subtitle">Acceso autorizado únicamente</p>

      <form id="loginForm">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="email">

        <label for="pass">Contraseña</label>
        <input type="password" id="password">

        <button type="submit">Iniciar Sesión</button>
      </form>

      <!-- 🔹 Aquí aparecerán los mensajes -->
      <div id="mensajeLogin" class="mensaje-form oculto" aria-live="polite"></div>

      <div id="loader"></div>
      <div class="acciones">
        <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
        <a href="registro.html">Registrar nuevo usuario</a>
      </div>
    </div>
  </div>
  <script src="JS/InicioSesion/usuario.js"></script>
</body>

</html>
