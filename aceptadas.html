<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Solicitudes Aprobadas | Auditor</title>

  <!-- Mantengo exactamente la hoja que usas en producción -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/analisissolicitud.css">
</head>
<body>
  <nav class="navbar auditor">
    <h2>Solicitudes Aprobadas</h2>
    <div class="subbar">
      <div class="acciones-superior">
        <button class="logout" onclick="window.location.href='panel-auditor.html'">Regresar</button>
      </div>
    </div>
  </nav>

  <main class="main-content" data-role="aprobadas-panel">
    <h3>Listado de Solicitudes Aprobadas</h3>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Tipo de Servicio</th>
          <th>Fecha de Aprobación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <!-- Este tbody lo rellena JS: id exacto requerido -->
      <tbody id="tablaAprobadas">
        <tr><td colspan="6" style="text-align:center;">Cargando...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>&copy; 2025 Auditorías en Línea | Todos los derechos reservados</footer>

  <!-- Overlays reutilizables que tu JS puede usar -->
  <div id="overlayMessage" aria-hidden="true" style="display:none;"></div>
  <div id="overlayCargando" aria-hidden="true" style="display:none;">
    <div class="box">
      <div class="spinner" aria-hidden="true"></div>
      <div class="text">Procesando...</div>
    </div>
  </div>

  <!-- Script (defer para asegurar DOM cargado) -->
  <script defer src="JS/AnalisisSolicitud/listarAprobadas.js"></script>
</body>
</html>
