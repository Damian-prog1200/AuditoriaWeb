<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitudes Pendientes | Auditor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/analisissolicitud.css">
  <!-- script que actualiza la tabla (usa PHP/Solicitud/listarPendientes.php) -->
  <script src="JS/AnalisisSolicitud/analisissolicitud.js"></script>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar auditor">
    <h2>Solicitudes Pendientes de Revisión</h2>

    <div class="subbar">
      <div class="acciones-superior">
        <button class="logout" onclick="window.location.href='panel-auditor.html'">Regresar</button>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main-content">
    <h3>Solicitudes Pendientes</h3>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Tipo de Servicio</th>
          <th>Fecha de Solicitud</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <!-- tbody vacío: será llenado por JS (JS/analisissolicitud.js) -->
      <tbody id="tablaPendientes"></tbody>
    </table>
  </main>

  <footer>
    &copy; 2025 Auditorías en Línea | Todos los derechos reservados
  </footer>
  <!-- 🔵 Modal de Confirmación Personalizado -->
  <div id="modalConfirmacion" class="overlay-modal" style="display: none;">
    <div class="modal-contenido">
      <h3 id="tituloModal">Confirmación</h3>
      <p id="modalMensaje"></p>

      <div class="modal-botones">
        <button id="btnAceptarModal" class="btn-aceptar">Aceptar</button>
        <button id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
      </div>
    </div>
  </div>
<div class="box">
  <div id="overlayCargando" class="overlay-cargando" style="display:none;">
  <div class="spinner" aria-hidden="true"></div>
  <p>Un momento...</p>
  </div>
</div>

</body>

</html>
