<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes | Portal Contable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/analisissolicitud.css">
</head>

<body>
    <nav class="navbar">
        <h2>Mis Solicitudes</h2>

        <div class="subbar">
            <div class="acciones-superior">
                <button class="logout" onclick="window.location.href='nueva.html'">+ Nueva Solicitud</button>
            </div>

            <!-- Menú desplegable -->
            <div class="dropdown" id="userMenu">
                <button class="dropbtn" id="menuBtn">⚙️ Opciones ▾</button>
                <div class="dropdown-content" id="menuContent">
                    <a href="#" id="logoutBtn" class="logout-option">🚪 Cerrar sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h3>Solicitudes Registradas</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCliente"></tbody>
        </table>
    </main>

    <footer>
        &copy; 2025 Auditorías en línea | Todos los derechos reservados
    </footer>
    
    <!-- 🔵 Modal de Confirmación Personalizado -->
  <div id="modalConfirmacion" class="overlay-modal" style="display: none;">
    <div class="modal-contenido">
      <h3 id="tituloModal">Confirmación</h3>
      <p id="modalMensaje"></p>

      <div class="modal-botones">
        <button id="btnAceptarModal" class="btn-aceptar">Aceptar</button>
        <button id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

    <script src="JS/AnalisisSolicitud/listarSolicitudes.js"></script>
    <script src="JS/AnalisisSolicitud/salir.js"></script>
</body>

</html>
