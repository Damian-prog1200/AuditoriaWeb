<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Contable | Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/iniciosesion.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Registro de Usuario</h1>

      <form id="registerForm">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre">

        <label for="email">Correo electrónico</label>
        <input type="email" id="email">

        <label for="password">Contraseña</label>
        <input type="password" id="password">

        <label for="rfc">RFC</label>
        <input type="text" id="rfc" maxlength="13">

        <button type="submit">Registrar</button>
      </form>

      <!-- 🟢 Aquí se mostrarán los mensajes dinámicos -->
      <div id="mensajeForm" class="mensaje-form oculto"></div>

      <div class="acciones">
        <a href="index.html">Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="JS/sesion/verificarSesion.js"></script>
  <script src="JS/InicioSesion/usuario.js"></script>
</body>

</html>
